<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 300px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111318;
        color: #e8eaf0;
      }

      /* ── header ── */
      .header {
        padding: 14px 16px;
        background: #1c1f2a;
        border-bottom: 1px solid #2a2d3a;
      }

      .header-title {
        font-size: 15px;
        font-weight: 600;
        color: #ffffff;
      }

      .header-subtitle {
        font-size: 11px;
        color: #555;
        margin-top: 2px;
      }

      /* ── page info (title + url) ── */
      .page-info {
        padding: 14px 16px;
        border-bottom: 1px solid #1e2030;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .info-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .info-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #4f8ef7;
      }

      .info-text {
        font-size: 12px;
        color: #9099b0;
        line-height: 1.5;
        word-break: break-all;
      }

      /* ── word count + reading time cards ── */
      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: #1e2030;
        border-bottom: 1px solid #1e2030;
      }

      .stat-card {
        background: #111318;
        padding: 18px 16px;
        text-align: center;
      }

      .stat-number {
        display: block;
        font-size: 30px;
        font-weight: 700;
        color: #4f8ef7;
        line-height: 1;
        margin-bottom: 6px;
      }

      .stat-label {
        font-size: 10px;
        color: #444;
        text-transform: uppercase;
        letter-spacing: 1.2px;
      }
      
    </style>
  </head>

  <body>

    <!-- header -->
    <div class="header">
      <div class="header-title">Reading Time</div>
      <div class="header-subtitle">Page analyzer</div>
    </div>

    <!-- title and url — filled in by popup.js -->
    <div class="page-info">
      <div class="info-row">
        <span class="info-label">Title</span>
        <span class="info-text" id="page-title">Loading...</span>
      </div>
      <div class="info-row">
        <span class="info-label">URL</span>
        <span class="info-text" id="page-url">Loading...</span>
      </div>
    </div>

    <!-- word count and reading time — filled in by popup.js -->
    <div class="stats">
      <div class="stat-card">
        <span class="stat-number" id="word-count">—</span>
        <span class="stat-label">words</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="read-time">—</span>
        <span class="stat-label">min read</span>
      </div>
    </div>

    <script src="popup.js"></script>

  </body>
</html>
